---
layout: default
---
<article class="page">
  <header class="page-hero">
    <div class="container">
      <h1 class="page-hero__title">{{ page.title }}</h1>
      {%- if page.subtitle %}
      <p class="page-hero__subtitle">{{ page.subtitle }}</p>
      {%- endif %}
    </div>
  </header>

  <div class="container page__body prose">
    {{ content }}
  </div>
</article>
